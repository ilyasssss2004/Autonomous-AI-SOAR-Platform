version: "3.8"

# --- Autonomous SOC: TheHive Case Management ---
# Stack: TheHive (Orchestration), Cassandra (Database), Elasticsearch (Search Index)
# -----------------------------------------------

services:
  elasticsearch:
    image: elasticsearch:7.17.9
    container_name: soc-thehive-es
    restart: always
    environment:
      - http.host=0.0.0.0
      - discovery.type=single-node
      - cluster.name=hive
      - script.allowed_types=inline
      - thread_pool.search.queue_size=100000
      - thread_pool.write.queue_size=10000
      - gateway.recover_after_nodes=1
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data

  cassandra:
    image: cassandra:4
    container_name: soc-thehive-cassandra
    restart: always
    environment:
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=256M
    volumes:
      - cassandra_data:/var/lib/cassandra

  thehive:
    image: thehiveproject/thehive4:4.1.24-1
    container_name: soc-thehive-app
    restart: always
    depends_on:
      - elasticsearch
      - cassandra
    ports:
      - "9000:9000"
    environment:
      - TH_ELASTICSEARCH_URI=http://elasticsearch:9200
      - TH_CASSANDRA_HOSTNAMES=cassandra
    volumes:
      - thehive_data:/opt/th/config
      - thehive_data:/opt/th/data

volumes:
  elasticsearch_data:
  cassandra_data:
  thehive_data:
